<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AsyncTech — Portfolio Directory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0b;
      color: #f0eee9;
      line-height: 1.5;
      min-height: 100vh;
    }
    .bg-noise {
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    header {
      text-align: center;
      padding: 60px 24px 40px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header h1 span { color: #6c5ce7; }
    header p {
      margin-top: 10px;
      color: rgba(240,238,233,0.5);
      font-size: 15px;
      font-weight: 400;
    }
    .count-badge {
      display: inline-block;
      margin-top: 14px;
      padding: 5px 14px;
      border-radius: 100px;
      background: rgba(108,92,231,0.12);
      border: 1px solid rgba(108,92,231,0.25);
      color: #a29bfe;
      font-size: 12px;
      font-weight: 600;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 32px 20px 80px; }

    .niche { margin-bottom: 44px; }
    .niche-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .niche-header .emoji { font-size: 22px; }
    .niche-header h2 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .niche-header .count {
      font-size: 12px;
      color: rgba(240,238,233,0.3);
      font-weight: 500;
      margin-left: 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 10px;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 16px 18px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      text-decoration: none;
      color: inherit;
      transition: all 0.2s ease;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      opacity: 0;
      transition: opacity 0.25s ease;
      background: linear-gradient(135deg, rgba(108,92,231,0.08) 0%, transparent 60%);
    }
    .card:hover {
      border-color: rgba(108,92,231,0.25);
      transform: translateY(-2px);
    }
    .card:hover::before { opacity: 1; }
    .card-name {
      font-size: 14px;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }
    .card-tagline {
      font-size: 12px;
      color: rgba(240,238,233,0.4);
      margin-top: 3px;
      position: relative;
      z-index: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-path {
      font-size: 11px;
      color: rgba(108,92,231,0.45);
      margin-top: 8px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 640px) {
      header { padding: 40px 16px 28px; }
      header h1 { font-size: 22px; }
      .container { padding: 20px 14px 60px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
      .card { padding: 13px 14px; }
    }
  </style>
</head>
<body>
<div class="bg-noise"></div>

<header>
  <h1>AsyncTech <span>Portfolio</span></h1>
  <p>30 premium single-page websites — built with React, Vite, Tailwind & Framer Motion</p>
  <div class="count-badge">30 sites · 6 industries</div>
</header>

<div class="container" id="app"></div>

<script>
const niches = [
  {
    emoji: '🌿', name: 'Restaurants',
    sites: [
      { name: 'Nocturne Table', tagline: 'A quieter kind of dining', path: '/restaurant-1/' },
      { name: 'Fireline Burgers', tagline: 'Built Hot. Served Loud.', path: '/fireline-burgers/' },
      { name: 'Olive & Grain', tagline: 'Mediterranean Café', path: '/olive-grain/' },
      { name: 'Kairo Sushi Bar', tagline: 'Minimal Japanese Dining', path: '/kairo-sushi/' },
      { name: 'Harvest Room', tagline: 'Farm-to-Table Restaurant', path: '/harvest-room/' },
    ]
  },
  {
    emoji: '🌳', name: 'Landscaping',
    sites: [
      { name: 'Verdant Studio', tagline: 'Luxury Landscape Design', path: '/verdant-studio/' },
      { name: 'YardCrew', tagline: 'Fast Local Lawn Care', path: '/yardcrew/' },
      { name: 'Stone & Bloom', tagline: 'Hardscaping & Outdoor Living', path: '/stone-bloom/' },
      { name: 'DesertLine', tagline: 'Drought-Resistant Landscaping', path: '/desertline/' },
      { name: 'Greenline Commercial', tagline: 'Commercial Grounds', path: '/greenline-commercial/' },
    ]
  },
  {
    emoji: '🏗️', name: 'Construction',
    sites: [
      { name: 'ForgeBuilt', tagline: 'Modern General Contractor', path: '/forgebuilt/' },
      { name: 'Haven Renovations', tagline: 'Premium Home Remodeling', path: '/haven-renovations/' },
      { name: 'SteelSpan', tagline: 'Commercial Builders', path: '/steelspan/' },
      { name: 'RapidRoof', tagline: 'Roofing & Exterior Repairs', path: '/rapidroof/' },
      { name: 'TerraForm Civil', tagline: 'Sitework & Land Dev', path: '/terraform-civil/' },
    ]
  },
  {
    emoji: '🏥', name: 'Healthcare',
    sites: [
      { name: 'Lumina Family Clinic', tagline: 'Modern Primary Care', path: '/lumina-clinic/' },
      { name: 'PulsePoint Urgent Care', tagline: 'Fast Walk-In Clinic', path: '/pulsepoint/' },
      { name: 'Align & Motion PT', tagline: 'Physical Therapy', path: '/align-motion/' },
      { name: 'Serenity Dental Studio', tagline: 'Premium Dental Clinic', path: '/serenity-dental/' },
      { name: 'CareBridge Home Health', tagline: 'Home Healthcare', path: '/carebridge/' },
    ]
  },
  {
    emoji: '❄️', name: 'HVAC',
    sites: [
      { name: 'ArcticLine HVAC', tagline: 'Premium Residential HVAC', path: '/arcticline/' },
      { name: 'Heatwave Emergency', tagline: '24/7 Urgent Repair', path: '/heatwave-emergency/' },
      { name: 'EcoBreeze', tagline: 'Energy-Efficient HVAC', path: '/ecobreeze/' },
      { name: 'DuctPro', tagline: 'Commercial HVAC', path: '/ductpro/' },
      { name: 'PureAir', tagline: 'Indoor Air Quality', path: '/pureair/' },
    ]
  },
  {
    emoji: '🏡', name: 'Real Estate',
    sites: [
      { name: 'Atelier Estates', tagline: 'Luxury Real Estate', path: '/atelier-estates/' },
      { name: 'NestFirst Realty', tagline: 'Family Home Agency', path: '/nestfirst/' },
      { name: 'UrbanGrid', tagline: 'Apartment Leasing', path: '/urbangrid/' },
      { name: 'Keystone Property', tagline: 'Commercial RE', path: '/keystone-property/' },
      { name: 'StayVista Homes', tagline: 'Short-Term Rentals', path: '/stayvista/' },
    ]
  },
];

const app = document.getElementById('app');
let html = '';
for (const niche of niches) {
  html += `<div class="niche">
    <div class="niche-header">
      <span class="emoji">${niche.emoji}</span>
      <h2>${niche.name}</h2>
      <span class="count">${niche.sites.length}</span>
    </div>
    <div class="grid">`;
  for (const site of niche.sites) {
    html += `<a href="${site.path}" class="card">
      <div class="card-name">${site.name}</div>
      <div class="card-tagline">${site.tagline}</div>
      <div class="card-path">${site.path}</div>
    </a>`;
  }
  html += `</div></div>`;
}
app.innerHTML = html;
</script>
</body>
</html>
