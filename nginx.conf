server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        return 301 /restaurant-1/;
    }

    location /restaurant-1/ {
        try_files $uri $uri/ /restaurant-1/index.html;
    }

    location /fireline-burgers/ {
        try_files $uri $uri/ /fireline-burgers/index.html;
    }

    location /olive-grain/ {
        try_files $uri $uri/ /olive-grain/index.html;
    }

    location /kairo-sushi/ {
        try_files $uri $uri/ /kairo-sushi/index.html;
    }

    location /harvest-room/ {
        try_files $uri $uri/ /harvest-room/index.html;
    }
}
